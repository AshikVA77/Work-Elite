{% extends 'Company/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password</title>
</head>
<style> .form-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 50px 0;
  }

  /* Stylish Card */
  .form-card {
    width: 500px;
    background: #ffffff;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border: 2px solid #e0e0e0;
  }

  /* Lift effect on hover */
  .form-card:hover {
    transform: translateY(-5px);
    box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.15);
  }

  /* Title Styling */
  .form-card h1 {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #333;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* Input Group */
  .card-input  {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
  }

  .card-input  label {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 5px;
  }

  .card-input  input,
  .card-input  textarea,
  .card-input  select {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border: 2px solid #ddd;
    border-radius: 8px;
    transition: border 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
  }

  /* Input focus effect */
  .card-input  input:focus,
  .card-input  textarea:focus,
  .card-input  select:focus {
    border-color: #146d05;
    outline: none;
    box-shadow: 0 0 8px rgba(20, 109, 5, 0.2);
  }
/* From Uiverse.io by biswacpcode */ 
.f-button {
  color: white;
  text-decoration: none;
  font-size: 25px;
  border: none;
  background: none;
  font-weight: 600;
  font-family: 'Poppins', sans-serif;
}

.f-button::before {
  margin-left: auto;
}

.f-button::after, .f-button::before {
  content: '';
  width: 0%;
  height: 2px;
  background: #f44336;
  display: block;
  transition: 0.5s;
}

.f-button:hover::after, .f-button:hover::before {
  width: 100%;
}
</style>
<body>
    <div class="form-container">
        <form action="" method="post" class="form-card">
            {% csrf_token %}
                <h1>Change Password</h1>
                <div class="card-input">
                    <label> Old Password</label>
                    <input type="text" name="oldpassword" class="form-controls" placeholder="Enter your old password" required >
                </div> 
                <div class="card-input">
                        <label>New Password</label>
                        <input type="password" name="newpassword" placeholder="Enter your new password"  pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required />
                </div>
                <div class="card-input">
                        <label>Retype Password</label>
                        <input type="password" name="retypepassword" placeholder="Retype Your password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required />
                </div>
                <center><button type="submit" class="f-button"><span style="color: black;">Change Password</span></button></center>
        </form>
    </div>
    {% if msg %}
    <script>
        alert("{{msg}}")
    </script>
    {% endif %}
</body>
</html>
{% endblock %}
