{% extends 'User/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    
</head>
<style>


/* Full Page Centering */
.form-container {
    width: 100%;
    height: 100vh;  /* Full screen height */
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f4f4f4;  /* Light gray background */
}

/* Profile Card */
.profile-card {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    text-align: center;
    width: 100%;
    max-width: 400px;
}

/* Heading */
h2 {
    margin-bottom: 20px;
    color: #333;
}

/* Form Groups */
.form-group {
    margin-bottom: 15px;
    text-align: left;
}

/* Labels */
label {
    font-weight: bold;
    color: #333;
    display: block;
    margin-bottom: 5px;
}

/* Input & Textarea */
input, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

/* File Input */
input[type="file"] {
    border: none;
    padding: 5px;
}

/* Submit Button */
.btn {
    background: #28a745;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
}

/* Button Hover */
.btn:hover {
    background: #218838;
}


</style>
<body>
    <div class="form-container">
        <div class="profile-card">
            <h2>Edit Profile</h2>
            <form action="" method="post" enctype="multipart/form-data">
                {% csrf_token %}
    
                <div class="form-group">
                    <label for="uname">Name</label>
                    <input type="text" name="uname" value="{{ user.user_name }}" 
                           placeholder="Enter your name"
                           title="Only alphabets, spaces, and first letter must be capital"
                           pattern="^[A-Z]+[a-zA-Z ]*$" required>
                </div>
    
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" value="{{ user.user_email }}" 
                           placeholder="Enter your email" required>
                </div>
    
                <div class="form-group">
                    <label for="contact">Contact</label>
                    <input type="text" name="contact" value="{{ user.user_contact }}" 
                           placeholder="Contact Number"
                           pattern="[6-9]{1}[0-9]{9}"
                           title="Phone number must start with 6-9 and be 10 digits long" required>
                </div>
    
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea name="address" rows="3" placeholder="Enter your address">{{ user.user_address }}</textarea>
                </div>
    
                <div class="form-group">
                    <label for="photo">Profile Photo</label>
                    <input type="file" name="photo" required>
                </div>
    
                <button type="submit" class="btn">Edit Profile</button>
            </form>
        </div>
    </div>
    
</body>
</html>
{% endblock %}
