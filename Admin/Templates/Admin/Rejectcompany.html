{% extends 'Admin/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejection Mail</title>
</head>

<body>
    <div class="container">
        <form action="" method="post">
            {% csrf_token %}
            <h1 class="text-light text-center">Rejection Mail</h1>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card bg-dark text-light p-4 border border-white">
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" id="subject" name="subject" class="form-control" placeholder="Enter the Subject" required>
                            </div>
                            <div class="mb-3">
                                <label for="content" class="form-label">Content</label>
                                <input type="text" id="content" name="content" class="form-control" placeholder="Mail Content" required>
                            </div>
                            <div class="text-center">
                                <input type="submit" name="submit" class="btn btn-success" value="Send Mail">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
{% endblock %}
