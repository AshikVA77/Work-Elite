<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <center>
            <h1>Product</h1>
        <table border="5">
            <tr>
                <td>Name</td>
                <td><input type="text" name="pname" placeholder="Enter the product name" required></td>
            </tr>
            <tr>
                <td>Price</td>
                <td><input type="text" name="price" placeholder="Enter the price" required></td>
            </tr>
            <tr>
                <td>Category</td>
                <td><select name="catlist" id="catlist" required>
                    <option>---Select---</option>
                    {% for i in category %}
                    <option value="{{i.id}}">{{i.category_name}}</option>
                    {% endfor %}
                     </select></td>
            </tr>
            <tr>
                <td>SubCategory</td>
                    <td><select name="subcat" id="subcat" required>
                        <option>---Select---</option>
                         </select></td>
            </tr>
            <tr>
                <td>Details</td>
                <td><textarea name="details" rows="3" cols="2" required></textarea></td>
            </tr>
            <tr>
                <td>Photo</td>
                <td><input type="file" name="photo" required></td>
            </tr>
            <tr><td colspan="2" align="center"><input type="submit" name="submit"  value="ADD"></td></tr>
        </table>
        <table border="5">
            <tr>
                <td>Product</td>
                <td>Price</td>
                <td>Category</td>
                <td>SubCategory</td>
                <td>Details</td>
                <td colspan="2">Photo</td>
                <td colspan="3">Action</td>
            </tr>
                {% for i in Product %}
            <tr>
                <td>{{ i.product_name }}</td>
                <td>{{ i.price }}</td> 
                <td>{{ i.subcategory.category.category_name }}</td>
                <td>{{ i.subcategory.subcategory_name }}</td>
                <td>{{ i.details }}</td>  
                <td colspan="2"><img src="{{i.product_photo.url}}" width="150" height="150"></td>
            </tr>
        {% endfor %}
            </tr>
        </table>
    </center>
    </form>
</body>
</html>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#catlist").change(function () {
        var did = $(this).val();
        var ur = "{% url 'Admin:ajaxcategory' %}"
        $.ajax({
            url: ur,
            data: { did: did, },
            success: function (data) {
                $("#subcat").html(data);
            },
        });
    });
</script>
