{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <title>Admin Registration</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="{% static 'Login/css/style.css'%}">
    <style>
        .drop{
            background-color: rgb(78, 78, 85);
        }
    </style>
  </head>
  <body style="background-image: url(../../static/Login/images/ubg.jpg);">
    <section class="ftco-section">
      <div class="container"> 
        <form action="" method="post">
          {% csrf_token %}
          <div class="row justify-content-center">
            <div class="col-md-6 text-center mb-5">
              <h1 class="heading-section">Admin Registration</h1>
            </div>      
          </div>
          <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
              <div class="login-wrap p-0">
                <div class="form-group">
                  <input type="text" name="name" placeholder="Enter Your Name" class="form-control"
                  title="Name Allows Only Alphabets, Spaces, and First Letter Must Be Capitalized"
                  pattern="^[A-Z]+[a-zA-Z ]*$" required>
                </div>
                <div class="form-group">
                  <input type="email" name="email" placeholder="Enter Your Email" class="form-control" required>
                </div>
                <div class="form-group">
                  <input type="password" name="Password" placeholder="Enter Your Password" class="form-control"
                  pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number, one uppercase and lowercase letter, and at least 8 or more characters" required>
                  <span toggle="#password-field" class="fa fa-fw fa-eye field-icon toggle-password"></span>
                </div>
                <div class="form-group">
                  <button type="submit" name="submit" class="form-control btn btn-primary submit px-3">Submit</button>
                </div>
              </div>
            </div>
          </div>
        </form>
        <div class="text-center">
          <h5 class="mb-4 text-center" style="color: white;">Already Have an account?
            <a href="{% url 'Guest:Login' %}">Login</a><br> <a href="{% url 'Admin:Adminhome' %}">Admin Dashboard</a>
          </h5>
        </div>
      </div>
    </section>

    <script src="{% static 'Login/js/jquery.min.js'%}"></script>
    <script src="{% static 'Login/js/popper.js'%}"></script>
    <script src="{% static 'Login/js/bootstrap.min.js'%}"></script>
    <script src="{% static 'Login/js/main.js'%}"></script>
  </body>
</html>
