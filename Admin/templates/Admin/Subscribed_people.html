{% extends 'Admin/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Details</title>
</head>
<style>
.card-container {
    max-width: 1000px;
    margin: auto;
}

h1 {
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 2px 2px 6px rgba(255, 255, 255, 0.2);
}

.card {
    background:black;
    border-radius: 15px;
    box-shadow: 0 8px 16px rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    padding: 20px;
}

.table {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    border-collapse: separate;
}

.table thead {
    
    color: #fff;
    text-transform: uppercase;
    font-weight: bold;
}

.table th, .table td {
    padding: 15px;
    text-align: center;
    font-size: 16px;
    border-bottom: black;
}

.table tbody tr {
    transition: transform 0.2s ease-in-out;
}

.table tbody tr:hover {
    transform: scale(1.02);
    background:rgb(52, 50, 50);
}

.badge {
    padding: 6px 12px;
    font-size: 14px;
    border-radius: 20px;
    font-weight: bold;
}

.status-expired {
    background: rgba(220, 53, 69, 0.2);
    color: #dc3545;
    border: 1px solid #dc3545;
}

.status-active {
    background: rgba(40, 167, 69, 0.2);
    color: #28a745;
    border: 1px solid #28a745;
}

</style>
<body>
    <div class="card-container">
        <h1>Total Subscriptions</h1>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card">
                <div class="card-body">
                    <table class="table text-light">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>User Name</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for i in data %}
                            <tr>
                                <td>{{ forloop.counter }}</td>
                                <td>{{ i.user.user_name }}</td>
                                <td>
                                    <span class="badge {% if i.payment_status == 1 %}status-expired{% else %}status-active{% endif %}">
                                        {% if i.payment_status == 1 %}
                                        Expired
                                        {% else %}
                                        Active
                                        {% endif %}
                                    </span>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>

</html>
{% endblock %}
