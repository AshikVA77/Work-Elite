{% extends 'Admin/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Type</title>
</head>

<body>
    <div class="container">
        <form action="" method="post">
            {% csrf_token %}
            <h1 class="text-light text-center">Add Company Type</h1>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card bg-dark text-light p-4 border border-white">
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="ctype" class="form-label">Company Type</label>
                                <input type="text" name="ctype" placeholder="Enter the Company type"
                                    class="form-control" required>
                            </div>
                            <div class="text-center">
                                <input type="submit" name="submit" class="btn btn-primary" value="Submit">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <h1 class="text-light text-center mt-4">Company Types</h1>
        <div class="container">
            <div class="row justify-content-center">
                {% for i in company %}
                <div class="col-md-4 mb-3">
                    <div class="card bg-dark text-light border border-white p-3">
                        <div class="card-body text-center">
                            <h5 class="card-title">{{ i.company_type }}</h5>
                            <a href="{% url 'Admin:delcompanytype' i.id %}" class="btn btn-outline-danger w-100 mt-2">Delete</a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        
    </div>
</body>

</html>
{% endblock %}
