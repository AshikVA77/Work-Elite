{% extends 'Admin/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Group</title>
</head>

<body>
    <div class="container">
        <form action="" method="post">
            {% csrf_token %}
            <h1 class="text-light text-center">Add Job Group</h1>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card bg-dark text-light p-4 border border-white">
                        <div class="card-body">
                            <div class="mb-3">
                                <input type="text" name="jgroup" placeholder="Enter the Job group" class="form-control"
                                    required>
                            </div>
                            <div class="text-center">
                                <input type="submit" name="submit" value="Submit" class="btn btn-primary">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <h1 class="text-light text-center mt-4">Job Group</h1>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card bg-dark text-light p-4 border border-white">
                        <div class="card-body">
                            <table class="table table-bordered table-hover text-light">
                                <tr>
                                    <td>No</td>
                                    <td>Job Group</td>
                                </tr>
                                {% for i in job %}
                                <tr>
                                    <td>{{ forloop.counter }}</td>
                                    <td>{{ i.job_group }}</td>
                                </tr>
                                {% endfor %}
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
{% endblock %}
