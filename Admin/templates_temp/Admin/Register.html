<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<style>
    body{
        border: 5px;
        background-color: bisque;
        margin: 50px;
        border-style: double;
        border-width: 20px;
    }
    input[type=text]
    {
        background-color: rgb(184, 167, 146);
        border-style: dotted;
       
    }
    input[type=submit]
    {
        background-color: crimson;
       
    }
</style>
<body>
    <center>
    <form action="" method="post">
        {% csrf_token %}
    <table>
        <tr>
        <td>First Name</td>
        <td><input type="text" name="fname"required></td>
       </tr>
       
       <tr>
        <td>Last Name</td>
        <td><input type="text" name="lname" required></td>
       </tr>

       <tr>
        <td>Gender</td>
        <td><input type="radio" name="gender" value="Male">Male
            <input type="radio" name="gender" value="female">Female
       </td>
       </tr>
       
       <tr>
        <td>Address</td>
        <td><textarea  name="address" rows="3" cols="6"></textarea></td>
       </tr>
       
       <tr>
        <td>Contact</td>
        <td><input type="text" name="Contact" required></td>
       </tr>

       <tr>
        <td>District</td>
       <td>    <select name="ddlDist">
              <option value="sel">--select--</option>
              <option value="Eranakulam">Eranakulam</option>
              <option value="Idukki">Idukki</option>
              <option value="pl">Palakkad</option>
              <option value="ma">Malappuram</option>
              <option value="tvm">Thiruvananthapuram</option>
       </select>
       </td>
       </tr>
       <tr>
        <td colspan="2" align="center">
            <input type="submit" name="submit" value="submit"></td>
        </tr>
        </table>
        <table>
            <tr>
                <td>Name:</td>
                <td>{{name}}</td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>{{gender}}</td>
            </tr>
            <tr>
                <td>Address:</td>
                <td>{{address}}</td>
            </tr>
            <tr>
                <td>Contact:</td>
                <td>{{contact}}</td>
            </tr>
            <tr>
                <td>District:</td>
                <td>{{district}}</td>
            </tr>
        </table>
</center>
       
</body>
</html>
